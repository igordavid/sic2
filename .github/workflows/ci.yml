name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Run ruff
        run: ruff check .
      - name: Run mypy
        run: mypy src
      - name: Run tests
        run: pytest -q
